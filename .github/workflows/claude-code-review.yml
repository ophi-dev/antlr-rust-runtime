name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt install linux-tools-common linux-tools-generic linux-tools-`uname -r`

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy --no-self-update
          rustup default stable

      - name: install cargo binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Flamegraph
        run: |
          cargo binstall -y flamegraph
          echo "-1" | sudo tee /proc/sys/kernel/perf_event_paranoid

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Install uv with
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: 3.12
          github-token: ${{ github.token }}
          ignore-nothing-to-cache: "true"
          activate-environment: "true"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          # Exposed to the skill's Bash steps for `gh pr comment` / `gh pr view`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          # When track_progress is enabled:
          # - Creates a tracking comment with progress checkboxes
          # - Includes all PR context (comments, attachments, images)
          # - Updates progress as the review proceeds
          # - Marks as completed when done
          track_progress: true
          claude_args: |
            --effort max
            --model "claude-opus-4-8[1m]"
            --no-chrome
            --dangerously-skip-permissions
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # On failure, preserve the raw Claude execution JSON (the action logs it to
      # ${{ runner.temp }}/claude-execution-output.json) so the run can be diagnosed
      # without re-triggering. Uploaded by path — the step output can be empty when
      # the first API turn errors out.
      - name: Upload Claude execution log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-log-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14
