name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip bot-authored PRs (release-please's ophiarch[bot], Renovate,
    # Dependabot, …). A review adds no value on an automated release commit or
    # dependency bump, and claude-code-action@v1 hard-fails on a Bot actor
    # ("Workflow initiated by non-human actor") — so without this guard those
    # PRs get a red ✗ after ~7 min of wasted toolchain setup. A job-level `if`
    # skips cleanly instead: the job reports "skipped" (neutral, not failed) and
    # never starts, so it neither blocks the PR nor burns CI minutes.
    # `user.type` is the same field the action keys on ("Actor type: Bot") and
    # is more robust than matching a "[bot]" login suffix.
    if: github.event.pull_request.user.type != 'Bot'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt install linux-tools-common linux-tools-generic "linux-tools-$(uname -r)"

      - name: Install stable Rust
        run: |
          rustup toolchain install --profile minimal --no-self-update
          rustup default stable

      - name: install cargo binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Flamegraph
        run: |
          cargo binstall -y flamegraph
          echo "-1" | sudo tee /proc/sys/kernel/perf_event_paranoid

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Install uv with
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          github-token: ${{ github.token }}
          ignore-nothing-to-cache: "true"
          activate-environment: "true"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_BASH_MAINTAIN_PROJECT_WORKING_DIR: "1"
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          # When track_progress is enabled:
          # - Creates a tracking comment with progress checkboxes
          # - Includes all PR context (comments, attachments, images)
          # - Updates progress as the review proceeds
          # - Marks as completed when done
          track_progress: true
          # Deliver the review through a single reused comment instead of a new one
          # each run.
          use_sticky_comment: true
          claude_args: |
            --effort max
            --model "claude-opus-4-8[1m]"
            --no-chrome
            --dangerously-skip-permissions
          plugins: "code-review@claude-code-plugins"

          # The trailing directive fixes a CI-only stall: the review skill fans out to
          # parallel sub-agents, and on its final turn the model would emit "I'll wait
          # for the agents to report…" and end the turn (stop_reason: end_turn) — but in
          # a non-interactive batch there is no async resume, so the consolidated review
          # was never posted even though every sub-agent had already returned. Forbid the
          # yield: sub-agent results are available synchronously in-session.
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            IMPORTANT (non-interactive CI run): You cannot pause and resume. Any
            sub-agents you spawn return their results synchronously within this same
            session — never end your turn saying you will "wait for" them. Once their
            results are in hand, immediately validate the candidate findings and post
            the consolidated review via update_claude_comment before finishing. The
            task is not complete until the consolidated review has been posted.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # Always preserve the raw Claude execution JSON (the action logs it to
      # ${{ runner.temp }}/claude-execution-output.json) so any run can be diagnosed
      # without re-triggering — including "completed but didn't post the review"
      # cases that exit 0. Uploaded by path — the step output can be empty when the
      # first API turn errors out. if-no-files-found: warn covers the validation-skip
      # path, which exits before the log file is written.
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-review-log-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: warn
          retention-days: 14
